name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Test frontend
        working-directory: frontend
        run: npm run test:run
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: backend
        run: python -m ruff check .
      - name: Ruff format check
        working-directory: backend
        run: python -m ruff format --check .
      - name: Mypy
        working-directory: backend
        run: python -m mypy app
      - name: Pytest
        working-directory: backend
        run: python -m pytest -m "not integration"

  backend-integration:
    name: Backend PostgreSQL integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: relayguard
          POSTGRES_USER: relayguard
          POSTGRES_PASSWORD: relayguard
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U relayguard -d relayguard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DB: relayguard
      POSTGRES_USER: relayguard
      POSTGRES_PASSWORD: relayguard
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5434
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Apply migrations
        working-directory: backend
        run: python -m alembic upgrade head
      - name: Run PostgreSQL integration tests
        working-directory: backend
        run: python -m pytest -m integration
